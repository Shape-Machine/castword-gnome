<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">

  <!-- Frog body -->
  <circle cx="60" cy="80" r="40" fill="#5cb832" stroke="#1a1a1a" stroke-width="3.5"/>

  <!-- Left eye bump -->
  <circle cx="42" cy="47" r="13" fill="#5cb832" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="42" cy="47" r="8" fill="white"/>
  <circle cx="44" cy="48" r="4" fill="#1a1a1a"/>

  <!-- Right eye bump -->
  <circle cx="74" cy="47" r="13" fill="#5cb832" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="74" cy="47" r="8" fill="white"/>
  <circle cx="76" cy="48" r="4" fill="#1a1a1a"/>

  <!-- Open mouth (mid-croak) -->
  <path d="M 36,79 Q 60,69 84,79 Q 78,100 60,101 Q 42,100 36,79 Z"
        fill="#c0392b" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Upper lip crease -->
  <path d="M 36,79 Q 60,73 84,79"
        fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Sound waves -->
  <path d="M 90,73 Q 97,81 90,89"
        fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 98,67 Q 108,81 98,95"
        fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 107,62 Q 120,81 107,100"
        fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

</svg>
