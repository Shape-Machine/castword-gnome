app-id: xyz.shapemachine.castword-gnome
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: castword

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # D-Bus: own the app's bus name (required for D-Bus activation)
  - --own-name=xyz.shapemachine.castword-gnome
  # Network access (LLM API calls)
  - --share=network
  # Secret Service (API key storage via libsecret)
  - --talk-name=org.freedesktop.secrets
  - --share=ipc

modules:
  # Python runtime dependencies — generated by flatpak-pip-generator
  # Regenerate with: scripts/update-flatpak-deps.sh
  - castword-pip-deps.yaml

  # castword-gnome application
  - name: castword-gnome
    buildsystem: simple
    build-commands:
      # Install the Python package (no network — all deps already installed above)
      # Flatpak requires PEP 440 versions; patch the date-based version before install
      - sed -i 's/^version = .*/version = "0.0.0"/' pyproject.toml
      - pip3 install --no-deps --no-build-isolation --prefix=/app .
      # Launcher wrapper that sets PYTHONPATH for vendored deps
      - |
        cat > /app/bin/castword << 'EOF'
        #!/bin/bash
        exec python3 -c "from castword.main import main; main()" "$@"
        EOF
        chmod +x /app/bin/castword
      # GSettings schema
      - install -Dm644 data/xyz.shapemachine.castword-gnome.gschema.xml
          /app/share/glib-2.0/schemas/xyz.shapemachine.castword-gnome.gschema.xml
      - glib-compile-schemas /app/share/glib-2.0/schemas/
      # Desktop file
      - install -Dm644 data/xyz.shapemachine.castword-gnome.desktop
          /app/share/applications/xyz.shapemachine.castword-gnome.desktop
      # AppStream metainfo
      - install -Dm644 data/xyz.shapemachine.castword-gnome.metainfo.xml
          /app/share/metainfo/xyz.shapemachine.castword-gnome.metainfo.xml
      # D-Bus service file
      - install -Dm644 data/xyz.shapemachine.castword-gnome.service
          /app/share/dbus-1/services/xyz.shapemachine.castword-gnome.service
      # Icons (PNG only — SVG skipped to avoid appstreamcli glycin dispatch bug on some hosts)
      - for size in 16x16 22x22 24x24 32x32 48x48 64x64 96x96 128x128 256x256 512x512; do
          install -Dm644 data/icons/hicolor/$size/apps/xyz.shapemachine.castword-gnome.png
            /app/share/icons/hicolor/$size/apps/xyz.shapemachine.castword-gnome.png;
        done
    sources:
      - type: dir
        path: ../..
